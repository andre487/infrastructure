- name: Add routing table name
  lineinfile:
    path: /etc/iproute2/rt_tables
    line: "100 awg"
    regexp: '^\s*100\s+awg\s*$'
    create: false
  tags:
    - chain-proxy

- name: Install awg policy routing unit
  copy:
    dest: /etc/systemd/system/awg-policy-routing.service
    mode: "0644"
    content: |
      [Unit]
      Description=Policy routing for Squid via awg0
      After=awg-quick@awg0.service
      Requires=awg-quick@awg0.service
      PartOf=awg-quick@awg0.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes

      ExecStart=/bin/sh -c '/usr/sbin/ip route replace default dev awg0 table 100'
      ExecStart=/bin/sh -c '/usr/sbin/ip rule del fwmark 0x64 table 100 priority 1000 2>/dev/null || true'
      ExecStart=/usr/sbin/ip rule add fwmark 0x64 table 100 priority 1000

      ExecStart=/bin/sh -c '/usr/sbin/nft add table inet squidmark 2>/dev/null || true'
      ExecStart=/bin/sh -c '/usr/sbin/nft flush chain inet squidmark output 2>/dev/null || /usr/sbin/nft "add chain inet squidmark output { type route hook output priority mangle; policy accept; }"'
      ExecStart=/usr/sbin/nft add rule inet squidmark output ip daddr 127.0.0.0/8 return
      ExecStart=/usr/sbin/nft add rule inet squidmark output meta skuid 13 ip protocol tcp meta mark set 0x64

      ExecStart=/bin/sh -c '/usr/sbin/nft add table ip awgnat 2>/dev/null || true'
      ExecStart=/bin/sh -c '/usr/sbin/nft flush chain ip awgnat postrouting 2>/dev/null || /usr/sbin/nft "add chain ip awgnat postrouting { type nat hook postrouting priority srcnat; policy accept; }"'
      ExecStart=/usr/sbin/nft add rule ip awgnat postrouting oifname "awg0" masquerade

      ExecStop=/bin/sh -c '/usr/sbin/ip rule del fwmark 0x64 table 100 priority 1000 2>/dev/null || true'
      ExecStop=/bin/sh -c '/usr/sbin/ip route flush table 100 2>/dev/null || true'
      ExecStop=/bin/sh -c '/usr/sbin/nft delete table inet squidmark 2>/dev/null || true'
      ExecStop=/bin/sh -c '/usr/sbin/nft delete table ip awgnat 2>/dev/null || true'

      [Install]
      WantedBy=multi-user.target awg-quick@awg0.service
  register: awg_policy_unit
  tags:
    - chain-proxy

- name: Enable and start policy routing unit
  systemd:
    name: awg-policy-routing.service
    enabled: true
    state: started
    daemon_reload: "{{ awg_policy_unit.changed }}"
  tags:
    - chain-proxy
