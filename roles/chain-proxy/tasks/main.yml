- name: Add routing table name
  lineinfile:
    path: /etc/iproute2/rt_tables
    line: "100 awg"
    regexp: '^\s*100\s+awg\s*$'
    create: false
  tags:
    - chain-proxy

# Apply/teardown logic lives in an idempotent script so it can be invoked both
# by the main oneshot unit (on boot / awg restart) and by a periodic heal timer
# that re-applies the rules if anything wipes them.
- name: Install awg policy routing script
  copy:
    dest: /usr/local/sbin/awg-policy-routing.sh
    mode: "0755"
    content: |
      #!/bin/sh
      # Managed by Ansible (roles/chain-proxy). Policy routing for Squid via
      # awg0. Idempotent: re-running "up" never leaves a gap and never
      # accumulates duplicate rules.
      set -eu

      up() {
          # Recreate both tables in a single atomic transaction. The
          # "add table; delete table; table {...}" idiom guarantees the table
          # exists, wipes it, then refills it - without a window where rules
          # are missing and without duplicates on re-runs.
          /usr/sbin/nft -f - <<NFT
      add table inet squidmark
      delete table inet squidmark
      table inet squidmark {
          chain output {
              type route hook output priority mangle; policy accept;
              ip daddr 127.0.0.0/8 return
              meta skuid 13 ip protocol tcp meta mark set 0x64
          }
      }

      add table ip awgnat
      delete table ip awgnat
      table ip awgnat {
          chain postrouting {
              type nat hook postrouting priority srcnat; policy accept;
              oifname "awg0" masquerade
          }
      }
      NFT

          # Default route + fwmark rule only make sense while awg0 is up.
          # Skip silently when it is down so the heal timer does not error out.
          if [ -d /sys/class/net/awg0 ]; then
              /usr/sbin/ip route replace default dev awg0 table 100
              while /usr/sbin/ip rule del fwmark 0x64 table 100 priority 1000 2>/dev/null; do :; done
              /usr/sbin/ip rule add fwmark 0x64 table 100 priority 1000
          fi
      }

      down() {
          while /usr/sbin/ip rule del fwmark 0x64 table 100 priority 1000 2>/dev/null; do :; done
          /usr/sbin/ip route flush table 100 2>/dev/null || true
          /usr/sbin/nft delete table inet squidmark 2>/dev/null || true
          /usr/sbin/nft delete table ip awgnat 2>/dev/null || true
      }

      case "${1:-up}" in
          up) up ;;
          down) down ;;
          *) echo "usage: $0 {up|down}" >&2; exit 2 ;;
      esac
  register: awg_policy_script
  tags:
    - chain-proxy

- name: Install awg policy routing unit
  copy:
    dest: /etc/systemd/system/awg-policy-routing.service
    mode: "0644"
    content: |
      [Unit]
      Description=Policy routing for Squid via awg0
      After=awg-quick@awg0.service
      Requires=awg-quick@awg0.service
      PartOf=awg-quick@awg0.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/sbin/awg-policy-routing.sh up
      ExecStop=/usr/local/sbin/awg-policy-routing.sh down

      [Install]
      WantedBy=multi-user.target awg-quick@awg0.service
  register: awg_policy_unit
  tags:
    - chain-proxy

# Self-healing: re-apply the rules periodically in case awg or anything else
# flushes them. "up" is idempotent so this is safe to run repeatedly.
- name: Install awg policy routing heal unit
  copy:
    dest: /etc/systemd/system/awg-policy-routing-heal.service
    mode: "0644"
    content: |
      [Unit]
      Description=Re-apply Squid policy routing rules if they were dropped
      After=awg-policy-routing.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/awg-policy-routing.sh up
  register: awg_policy_heal_unit
  tags:
    - chain-proxy

- name: Install awg policy routing heal timer
  copy:
    dest: /etc/systemd/system/awg-policy-routing-heal.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Periodically re-apply Squid policy routing rules

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec=1min
      AccuracySec=10s
      Unit=awg-policy-routing-heal.service

      [Install]
      WantedBy=timers.target
  register: awg_policy_timer
  tags:
    - chain-proxy

- name: Reload systemd for awg policy routing units
  systemd:
    daemon_reload: true
  when: >-
    awg_policy_script.changed or awg_policy_unit.changed
    or awg_policy_heal_unit.changed or awg_policy_timer.changed
  tags:
    - chain-proxy

- name: Enable and start policy routing unit
  systemd:
    name: awg-policy-routing.service
    enabled: true
    state: restarted
  tags:
    - chain-proxy

- name: Enable and start policy routing heal timer
  systemd:
    name: awg-policy-routing-heal.timer
    enabled: true
    state: started
  tags:
    - chain-proxy
