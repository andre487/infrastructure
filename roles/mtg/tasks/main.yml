- name: Add routing table name
  lineinfile:
    path: /etc/iproute2/rt_tables
    line: "{{ route_table_id }} {{ route_table_name }}"
    regexp: "^{{ route_table_id }}\\s+{{ route_table_name }}$"
    state: present
  tags:
    - tg-proxy

- name: Create dedicated Docker network for MTG
  community.docker.docker_network:
    name: "{{ mtg_net_name }}"
    driver: bridge
    ipam_config:
      - subnet: "{{ mtg_subnet }}"
        gateway: "{{ mtg_gateway }}"
    driver_options:
      com.docker.network.bridge.name: "{{ mtg_bridge_name }}"
  tags:
    - tg-proxy

- name: Create nftables include dir
  file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"
  tags:
    - tg-proxy

- name: Install nftables rules for MTG policy routing
  copy:
    dest: /etc/nftables.d/mtg-awg.nft
    mode: "0644"
    content: |
      table inet mtg_awg {
        chain prerouting {
          type filter hook prerouting priority mangle; policy accept;

          iifname "{{ mtg_bridge_name }}" ip saddr {{ mtg_subnet }} tcp sport 3128 accept
          iifname "{{ mtg_bridge_name }}" ip saddr {{ mtg_subnet }} tcp sport 3129 accept

          iifname "{{ mtg_bridge_name }}" ip saddr {{ mtg_subnet }} meta mark set {{ fwmark }}
        }

        chain postrouting {
          type nat hook postrouting priority srcnat; policy accept;

          oifname "{{ awg_iface }}" ip saddr {{ mtg_subnet }} masquerade
        }
      }
  notify:
    - Reload nftables
    - Restart Docker
  tags:
    - tg-proxy

- name: Ensure nftables includes /etc/nftables.d
  lineinfile:
    path: /etc/nftables.conf
    line: 'include "/etc/nftables.d/*.nft"'
    state: present
  notify:
    - Reload nftables
    - Restart Docker
  tags:
    - tg-proxy

- name: Install policy routing systemd unit
  copy:
    dest: /etc/systemd/system/mtg-awg-routing.service
    mode: "0644"
    content: |
      [Unit]
      Description=Policy routing for MTG Docker network via AWG
      After=network-online.target docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/sh -c 'ip route replace default dev {{ awg_iface }} table {{ route_table_id }}'
      ExecStart=/bin/sh -c 'ip rule show | grep -q "fwmark {{ fwmark }}.*lookup {{ route_table_id }}" || ip rule add fwmark {{ fwmark }} table {{ route_table_id }} priority 10044'
      ExecStop=/bin/sh -c 'ip rule del fwmark {{ fwmark }} table {{ route_table_id }} priority 10044 || true'
      ExecStop=/bin/sh -c 'ip route flush table {{ route_table_id }} || true'

      [Install]
      WantedBy=multi-user.target
  register: policy_routing_unit
  tags:
    - tg-proxy

- name: Enable policy routing
  systemd:
    name: mtg-awg-routing.service
    daemon_reload: "{{ policy_routing_unit.changed }}"
    enabled: true
    state: restarted
  tags:
    - tg-proxy

- name: Ensure MTG config directory exists
  ansible.builtin.file:
    path: /etc/mtg
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags:
    - tg-proxy

- name: Check MTG secret file
  ansible.builtin.stat:
    path: /etc/mtg/secret.txt
  register: mtg_secret_file
  tags:
    - tg-proxy

- name: Generate MTG secret
  ansible.builtin.command:
    cmd: docker run --rm nineseconds/mtg:2 generate-secret --hex "{{ fake_tls_domain }}"
  register: mtg_generated_secret
  changed_when: true
  when: not mtg_secret_file.stat.exists
  tags:
    - tg-proxy

- name: Save MTG secret
  ansible.builtin.copy:
    dest: /etc/mtg/secret.txt
    content: "{{ mtg_generated_secret.stdout | trim }}\n"
    owner: root
    group: root
    mode: "0600"
  when: not mtg_secret_file.stat.exists
  tags:
    - tg-proxy

- name: Read MTG secret
  ansible.builtin.slurp:
    src: /etc/mtg/secret.txt
  register: mtg_secret_slurp
  tags:
    - tg-proxy

- name: Set MTG secret fact
  ansible.builtin.set_fact:
    mtg_secret: "{{ mtg_secret_slurp.content | b64decode | trim }}"
  tags:
    - tg-proxy

- name: Create MTG link file
  ansible.builtin.template:
    src: templates/link.txt.j2
    dest: /etc/mtg/link.txt
    owner: root
    group: root
    mode: "0600"
  tags:
    - tg-proxy

- name: Configure MTG
  ansible.builtin.template:
    src: templates/mtg.config.toml.j2
    dest: /etc/mtg/config.toml
    owner: root
    group: root
    mode: "0600"
  tags:
    - tg-proxy

- name: Run MTG container
  community.docker.docker_container:
    name: mtg-proxy
    image: nineseconds/mtg:2
    state: started
    restart_policy: unless-stopped
    pull: true
    recreate: true
    networks:
      - name: "{{ mtg_net_name }}"
    published_ports:
      - "0.0.0.0:443:3128/tcp"
      - "127.0.0.1:3129:3129/tcp"
    volumes:
      - /etc/mtg/config.toml:/config.toml:ro
    log_driver: journald
  tags:
    - tg-proxy

- name: Read MTG link
  ansible.builtin.slurp:
    src: /etc/mtg/link.txt
  register: mtg_link_file
  tags:
    - tg-proxy

- name: Print MTG link
  ansible.builtin.debug:
    msg: "{{ mtg_link_file.content | b64decode | trim }}"
  tags:
    - tg-proxy
