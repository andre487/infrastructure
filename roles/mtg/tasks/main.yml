- name: Add routing table name
  lineinfile:
    path: /etc/iproute2/rt_tables
    line: "{{ route_table_id }} {{ route_table_name }}"
    regexp: "^{{ route_table_id }}\\s+{{ route_table_name }}$"
    state: present
  tags:
    - tg-proxy

- name: Create dedicated Docker network for MTG
  community.docker.docker_network:
    name: "{{ mtg_net_name }}"
    driver: bridge
    ipam_config:
      - subnet: "{{ mtg_subnet }}"
        gateway: "{{ mtg_gateway }}"
    driver_options:
      com.docker.network.bridge.name: "{{ mtg_bridge_name }}"
  tags:
    - tg-proxy

- name: Install policy routing systemd unit
  copy:
    dest: /etc/systemd/system/mtg-awg-routing.service
    mode: "0644"
    content: |
      [Unit]
      Description=Policy routing for MTG Docker network via AWG
      After=network-online.target docker.service awg-quick@{{ awg_iface }}.service
      Wants=network-online.target
      Requires=awg-quick@{{ awg_iface }}.service
      PartOf=awg-quick@{{ awg_iface }}.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes

      # Default route via awg0 in the dedicated table + fwmark rule pointing to it
      ExecStart=/bin/sh -c '/usr/sbin/ip route replace default dev {{ awg_iface }} table {{ route_table_id }}'
      ExecStart=/bin/sh -c '/usr/sbin/ip rule del fwmark {{ fwmark }} table {{ route_table_id }} priority 10044 2>/dev/null || true'
      ExecStart=/usr/sbin/ip rule add fwmark {{ fwmark }} table {{ route_table_id }} priority 10044

      # Mark traffic forwarded from the MTG container so it uses the awg0 table.
      # Proxy replies (sport 3128/3129) are left unmarked so they return via the main interface.
      ExecStart=/bin/sh -c '/usr/sbin/nft add table inet mtg_awg 2>/dev/null || true'
      ExecStart=/bin/sh -c '/usr/sbin/nft flush chain inet mtg_awg prerouting 2>/dev/null || /usr/sbin/nft "add chain inet mtg_awg prerouting { type filter hook prerouting priority mangle; policy accept; }"'
      ExecStart=/usr/sbin/nft add rule inet mtg_awg prerouting iifname "{{ mtg_bridge_name }}" ip saddr {{ mtg_subnet }} tcp sport 3128 return
      ExecStart=/usr/sbin/nft add rule inet mtg_awg prerouting iifname "{{ mtg_bridge_name }}" ip saddr {{ mtg_subnet }} tcp sport 3129 return
      ExecStart=/usr/sbin/nft add rule inet mtg_awg prerouting iifname "{{ mtg_bridge_name }}" ip saddr {{ mtg_subnet }} meta mark set {{ fwmark }}

      # Masquerade marked container traffic leaving via awg0
      ExecStart=/bin/sh -c '/usr/sbin/nft add table ip mtg_awgnat 2>/dev/null || true'
      ExecStart=/bin/sh -c '/usr/sbin/nft flush chain ip mtg_awgnat postrouting 2>/dev/null || /usr/sbin/nft "add chain ip mtg_awgnat postrouting { type nat hook postrouting priority srcnat; policy accept; }"'
      ExecStart=/usr/sbin/nft add rule ip mtg_awgnat postrouting oifname "{{ awg_iface }}" ip saddr {{ mtg_subnet }} masquerade

      ExecStop=/bin/sh -c '/usr/sbin/ip rule del fwmark {{ fwmark }} table {{ route_table_id }} priority 10044 2>/dev/null || true'
      ExecStop=/bin/sh -c '/usr/sbin/ip route flush table {{ route_table_id }} 2>/dev/null || true'
      ExecStop=/bin/sh -c '/usr/sbin/nft delete table inet mtg_awg 2>/dev/null || true'
      ExecStop=/bin/sh -c '/usr/sbin/nft delete table ip mtg_awgnat 2>/dev/null || true'

      [Install]
      WantedBy=multi-user.target awg-quick@{{ awg_iface }}.service
  register: policy_routing_unit
  tags:
    - tg-proxy

- name: Enable policy routing
  systemd:
    name: mtg-awg-routing.service
    daemon_reload: "{{ policy_routing_unit.changed }}"
    enabled: true
    state: restarted
  tags:
    - tg-proxy

- name: Ensure MTG config directory exists
  ansible.builtin.file:
    path: /etc/mtg
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags:
    - tg-proxy

- name: Check MTG secret file
  ansible.builtin.stat:
    path: /etc/mtg/secret.txt
  register: mtg_secret_file
  tags:
    - tg-proxy

- name: Generate MTG secret
  ansible.builtin.command:
    cmd: docker run --rm nineseconds/mtg:2 generate-secret --hex "{{ fake_tls_domain }}"
  register: mtg_generated_secret
  changed_when: true
  when: not mtg_secret_file.stat.exists
  tags:
    - tg-proxy

- name: Save MTG secret
  ansible.builtin.copy:
    dest: /etc/mtg/secret.txt
    content: "{{ mtg_generated_secret.stdout | trim }}\n"
    owner: root
    group: root
    mode: "0600"
  when: not mtg_secret_file.stat.exists
  tags:
    - tg-proxy

- name: Read MTG secret
  ansible.builtin.slurp:
    src: /etc/mtg/secret.txt
  register: mtg_secret_slurp
  tags:
    - tg-proxy

- name: Set MTG secret fact
  ansible.builtin.set_fact:
    mtg_secret: "{{ mtg_secret_slurp.content | b64decode | trim }}"
  tags:
    - tg-proxy

- name: Create MTG link file
  ansible.builtin.template:
    src: templates/link.txt.j2
    dest: /etc/mtg/link.txt
    owner: root
    group: root
    mode: "0600"
  tags:
    - tg-proxy

- name: Configure MTG
  ansible.builtin.template:
    src: templates/mtg.config.toml.j2
    dest: /etc/mtg/config.toml
    owner: root
    group: root
    mode: "0600"
  tags:
    - tg-proxy

- name: Run MTG container
  community.docker.docker_container:
    name: mtg-proxy
    image: nineseconds/mtg:2
    state: started
    restart_policy: unless-stopped
    pull: true
    recreate: true
    networks:
      - name: "{{ mtg_net_name }}"
    published_ports:
      - "0.0.0.0:443:3128/tcp"
      - "127.0.0.1:3129:3129/tcp"
    volumes:
      - /etc/mtg/config.toml:/config.toml:ro
    log_driver: journald
  tags:
    - tg-proxy

- name: Read MTG link
  ansible.builtin.slurp:
    src: /etc/mtg/link.txt
  register: mtg_link_file
  tags:
    - tg-proxy

- name: Print MTG link
  ansible.builtin.debug:
    msg: "{{ mtg_link_file.content | b64decode | trim }}"
  tags:
    - tg-proxy
